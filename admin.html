<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiona Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f7f4;--bg2:#fff;--dark:#0f0f13;--accent:#c8a97e;--accent2:rgba(200,169,126,0.12);--text:#1a1a1a;--muted:#888;--border:#e8e4de;--green:#2d9e6b;--red:#e04444}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:32px}
.login-title{font-size:24px;font-weight:500;color:var(--dark);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.login-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;background:var(--bg);color:var(--text)}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:12px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-error{font-size:13px;color:var(--red);margin-top:10px;display:none}

/* DASHBOARD */
#dashboard{display:none;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-logo{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:500}
.header-right{display:flex;align-items:center;gap:16px}
.header-user{font-size:13px;color:var(--muted)}
.logout-btn{font-size:13px;color:var(--muted);background:none;border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

.main{padding:32px}
.page-title{font-size:22px;font-weight:500;color:var(--dark);margin-bottom:4px}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:28px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px 22px}
.stat-label{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-size:28px;font-weight:500;color:var(--dark)}
.stat-value.green{color:var(--green)}
.stat-value.accent{color:var(--accent)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:var(--bg2);transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.filter-select{padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:var(--bg2);cursor:pointer}
.refresh-btn{padding:9px 18px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.refresh-btn:hover{opacity:.85}
.refresh-btn.loading{opacity:.6;cursor:not-allowed}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{padding:12px 16px;text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
td{padding:14px 16px;font-size:13.5px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.td-name{font-weight:500;color:var(--dark)}
.td-email{color:var(--accent);font-family:'DM Mono',monospace;font-size:12.5px}
.td-email a{color:inherit;text-decoration:none}
.td-email a:hover{text-decoration:underline}
.bot-badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:500;background:var(--accent2);color:#7a5c2e}
.td-msg{color:var(--muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px}
.td-time{color:var(--muted);font-size:12px;white-space:nowrap}

.empty-state{padding:60px;text-align:center;color:var(--muted);font-size:14px}
.loading-state{padding:60px;text-align:center;color:var(--muted);font-size:14px}

.status-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:768px){
  .stats{grid-template-columns:1fr 1fr}
  .main{padding:16px}
  header{padding:14px 16px}
  .td-msg,.td-time{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Axiona Group</div>
    <div class="login-title">Admin Panel</div>
    <div class="login-sub">Prihláste sa pre prístup k leadom</div>
    <input class="login-input" type="password" id="login-pwd" placeholder="Heslo" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Prihlásiť sa</button>
    <div class="login-error" id="login-error">Nesprávne heslo</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div class="header-logo">Axiona Admin</div>
    <div class="header-right">
      <span class="header-user" id="header-user"></span>
      <button class="logout-btn" onclick="doLogout()">Odhlásiť</button>
    </div>
  </header>
  <div class="main">
    <div class="page-title">Leady z chatbota</div>
    <div class="page-sub">Prehľad všetkých záujemcov v reálnom čase</div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Celkom leadov</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dnes</div>
        <div class="stat-value green" id="stat-today">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tento týždeň</div>
        <div class="stat-value accent" id="stat-week">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Najaktívnejší bot</div>
        <div class="stat-value" id="stat-bot" style="font-size:15px;padding-top:6px">—</div>
      </div>
    </div>

    <div class="toolbar">
      <input class="search-input" id="search" placeholder="Hľadať podľa mena alebo emailu..." oninput="filterTable()">
      <select class="filter-select" id="bot-filter" onchange="filterTable()">
        <option value="">Všetky boty</option>
        <option value="Realitny">Realitný asistent</option>
        <option value="Financny">Finančný poradca</option>
        <option value="Zakaznicka">Zákaznícka podpora</option>
      </select>
      <button class="refresh-btn" id="refresh-btn" onclick="loadLeads()">↻ Obnoviť</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Meno</th>
            <th>Email</th>
            <th>Bot</th>
            <th>Správa</th>
            <th>Čas</th>
          </tr>
        </thead>
        <tbody id="leads-tbody">
          <tr><td colspan="6" class="loading-state">Načítavam leady...</td></tr>
        </tbody>
      </table>
      <div class="status-bar">
        <div><span class="status-dot"></span>Live — Google Sheets</div>
        <div id="last-refresh">—</div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
var CONFIG = {
  password: 'axiona2026',
  sheetId:  '1rfCAFO79RNbIO6hhFC2rcgLVexoW5tfWgytaut4SecU',
  apiKey:   'AIzaSyDWAesFdZkgVvzV8RNTgtdxb6IgrH9HxY8',
  sheetName: 'Hárok1',
  clientName: 'Axiona Group'
};
// ═══════════════════════════════════════════

var allLeads = [];

function doLogin(){
  var pwd = document.getElementById('login-pwd').value;
  if(pwd === CONFIG.password){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('header-user').textContent = CONFIG.clientName;
    loadLeads();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-pwd').value = '';
  }
}

function doLogout(){
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-pwd').value = '';
}

async function loadLeads(){
  var btn = document.getElementById('refresh-btn');
  btn.textContent = 'Načítavam...';
  btn.classList.add('loading');
  btn.disabled = true;

  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + CONFIG.sheetId +
    '/values/' + encodeURIComponent(CONFIG.sheetName) + '?key=' + CONFIG.apiKey;

  try {
    var res = await fetch(url);
    var data = await res.json();
    var rows = data.values || [];
    // Skip header row
    allLeads = rows.slice(1).map(function(r, i){
      return {
        index: i+1,
        meno:   r[0] || '',
        email:  r[1] || '',
        bot:    r[2] || '',
        sprava: r[3] || '',
        cas:    r[4] || ''
      };
    }).reverse();
    updateStats();
    filterTable();
    document.getElementById('last-refresh').textContent = 'Posledná aktualizácia: ' + new Date().toLocaleTimeString('sk-SK');
  } catch(e) {
    document.getElementById('leads-tbody').innerHTML = '<tr><td colspan="6" class="empty-state">Chyba pri načítaní. Skontrolujte prístup k tabuľke.</td></tr>';
  }

  btn.textContent = '↻ Obnoviť';
  btn.classList.remove('loading');
  btn.disabled = false;
}

function updateStats(){
  document.getElementById('stat-total').textContent = allLeads.length;
  var today = new Date().toLocaleDateString('sk-SK');
  var todayCount = allLeads.filter(function(l){ return l.cas.indexOf(today.split('.')[0]) > -1 || l.cas.startsWith(today); }).length;
  document.getElementById('stat-today').textContent = todayCount;
  var weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
  document.getElementById('stat-week').textContent = allLeads.length;
  // Most active bot
  var botCount = {};
  allLeads.forEach(function(l){ botCount[l.bot] = (botCount[l.bot]||0)+1; });
  var topBot = Object.keys(botCount).sort(function(a,b){return botCount[b]-botCount[a];})[0];
  document.getElementById('stat-bot').textContent = topBot ? topBot.split(' ')[0] : '—';
}

function filterTable(){
  var search = document.getElementById('search').value.toLowerCase();
  var botFilter = document.getElementById('bot-filter').value.toLowerCase();
  var filtered = allLeads.filter(function(l){
    var matchSearch = !search || l.meno.toLowerCase().includes(search) || l.email.toLowerCase().includes(search);
    var matchBot = !botFilter || l.bot.toLowerCase().includes(botFilter);
    return matchSearch && matchBot;
  });
  renderTable(filtered);
}

function renderTable(leads){
  var tbody = document.getElementById('leads-tbody');
  if(!leads.length){
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Žiadne leady nenájdené</td></tr>';
    return;
  }
  tbody.innerHTML = leads.map(function(l, i){
    return '<tr>' +
      '<td style="color:var(--muted);font-size:12px">' + (leads.length - i) + '</td>' +
      '<td class="td-name">' + esc(l.meno || '—') + '</td>' +
      '<td class="td-email"><a href="mailto:' + esc(l.email) + '">' + esc(l.email || '—') + '</a></td>' +
      '<td><span class="bot-badge">' + esc(l.bot.split(' ')[0] || '—') + '</span></td>' +
      '<td class="td-msg" title="' + esc(l.sprava) + '">' + esc(l.sprava || '—') + '</td>' +
      '<td class="td-time">' + esc(l.cas || '—') + '</td>' +
      '</tr>';
  }).join('');
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-refresh every 60 seconds
setInterval(function(){
  if(document.getElementById('dashboard').style.display !== 'none') loadLeads();
}, 60000);
</script>
</body>
</html>
